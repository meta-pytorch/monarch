apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: generator-rdma
  namespace: monarch-tests
spec:
  spec:
    devices:
      requests:
      - name: req-mrdma
        exactly:
          deviceClassName: mrdma.google.com
          allocationMode: ExactCount
          count: 3  # match the number of GPUs requested for the generator pod
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: learner-rdma
  namespace: monarch-tests
spec:
  spec:
    devices:
      requests:
      - name: req-mrdma
        exactly:
          deviceClassName: mrdma.google.com
          allocationMode: ExactCount
          count: 2  # match the number of GPUs requested for the learner pod
---
apiVersion: monarch.pytorch.org/v1alpha1
kind: MonarchMesh
metadata:
  name: generator
  namespace: monarch-tests
spec:
  port: 26600
  replicas: 2
  podTemplate:
    spec:
      containers:
      - command:
        - python
        - -u
        - -c
        - |
          import subprocess, sys
          # --break-system-packages is required on the Debian-based monarch image
          # (PEP 668); without it pip refuses to install into the system Python.
          subprocess.check_call([
              sys.executable, "-m", "pip", "install", "--quiet",
              "--break-system-packages",
              "--upgrade",
              "transformers",
              "tokenizers",
              "accelerate",
          ])
          import os
          import socket
          from monarch.actor import run_worker_loop_forever
          port = os.environ.get("MONARCH_PORT", "26600")
          hostname = socket.getfqdn()
          address = f"tcp://{hostname}:{port}"
          run_worker_loop_forever(address=address, ca="trust_all_connections")
        env:
        - name: MONARCH_PORT
          value: "26600"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: expandable_segments:True
        - name: HF_HOME
          value: /tmp/hf_cache
        image: ghcr.io/meta-pytorch/monarch:latest
        name: worker
        readinessProbe:
          failureThreshold: 60
          initialDelaySeconds: 30
          periodSeconds: 5
          tcpSocket:
            port: 26600
          timeoutSeconds: 5
        resources:
          claims:
          - name: rdma
          limits:
            nvidia.com/gpu: "3"
          requests:
            nvidia.com/gpu: "3"
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
      resourceClaims:
      - name: rdma
        resourceClaimTemplateName: generator-rdma
      volumes:
      - emptyDir:
          medium: Memory
          sizeLimit: 16Gi
        name: dshm
---
