name: Build macOS Wheels

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions to build (e.g., ["3.10", "3.11", "3.12", "3.13"])'
        type: string
        default: '["3.10", "3.11", "3.12", "3.13"]'
      extra:
        description: 'pyproject.toml extra naming the torch flavor (e.g., cpu-nightly, cpu)'
        type: string
        default: 'cpu-nightly'
      torch-version:
        description: 'Optional version pin for torch (e.g., 2.12.0). Empty = latest matching the extra-selected index.'
        type: string
        default: ''
      runner:
        description: 'macOS runner to use'
        type: string
        default: 'macos-latest'
      version:
        description: 'Version string for the wheel (default: $current_version.dev<date>)'
        type: string
        default: ''
      timeout:
        description: 'Job timeout in minutes'
        type: number
        default: 90

jobs:
  build:
    name: cpu-py${{ matrix.python-version }}-macos
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install macOS build dependencies
        shell: bash
        run: |
          set -eux
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install protobuf

      - name: Build macOS wheel
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target
          USE_TENSOR_ENGINE: "1"
        run: |
          set -eux
          source scripts/common-setup-macos.sh
          setup_uv_macos
          # Install torch + build-time deps only. The uv build command below is
          # the project build, so avoid an earlier isolated editable build.
          torch_extra="${{ inputs.extra }}"
          if [ "$torch_extra" = "cpu-nightly" ] && [ "${{ matrix.python-version }}" = "3.11" ]; then
            # PyTorch nightly CPU currently does not publish macOS cp311 wheels.
            # Match pip's old extra-index fallback behavior for this one wheel.
            torch_extra="cpu"
          fi
          if [ -n "${{ inputs.torch-version }}" ]; then
            uv sync --inexact --no-install-project --extra "$torch_extra" --extra build \
              --upgrade-package "torch==${{ inputs.torch-version }}"
          else
            uv sync --inexact --no-install-project --extra "$torch_extra" --extra build
          fi

          if [ -n "${{ inputs.version }}" ]; then
            export MONARCH_VERSION="${{ inputs.version }}"
          else
            export MONARCH_VERSION=0.6.0.dev$(date +'%Y%m%d')
          fi

          uv build --wheel --no-build-isolation
          ls -la dist/
          uv pip install dist/*.whl
          python -c "import monarch"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: monarch-py${{ matrix.python-version }}-cpu-macos
          path: dist/*.whl
          if-no-files-found: error
