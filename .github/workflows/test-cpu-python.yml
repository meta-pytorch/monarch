name: Test CPU Python

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Wheel artifact name from build workflow'
        required: true
        type: string
      python-version:
        description: 'Python version to test with'
        type: string
        default: '3.10'
      runner:
        description: 'Linux runner to use for the test'
        type: string
        default: 'linux.4xlarge'

concurrency:
  group: test-cpu-python-${{ inputs.runner }}-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  test-cpu-python:
    name: Test CPU Python - Tensor Engine
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      timeout: 120
      runner: ${{ inputs.runner }}
      submodules: recursive
      download-artifact: ${{ inputs.artifact-name }}
      script: |
        # Source common setup functions
        source scripts/common-setup.sh

        # Fetch tests disabled via GitHub issues titled "DISABLED <test-name>".
        # Writes disabled_tests.txt (read by conftest.py).
        python3 scripts/fetch_disabled_tests.py

        # Setup test environment
        setup_test_environment

        # Install tensor engine runtime deps (fmt + RDMA libs; latter
        # unused when MONARCH_GPU_PLATFORM=none gated the build).
        setup_tensor_engine

        # Force CPU-only tensor engine at runtime. The wheel was built with
        # MONARCH_GPU_PLATFORM=none and NCCL/RDMA code paths short-circuit
        # when CUDA is unavailable; this makes the expectation explicit.
        export MONARCH_GPU_PLATFORM=none

        # Install PyTorch nightly (CPU)
        pip install --pre torch --extra-index-url https://download.pytorch.org/whl/nightly/cpu

        # Install the built wheel from artifact
        install_wheel_from_artifact

        # Verify the CPU tensor engine is available in the wheel.
        python -c "from monarch import _rust_bindings; assert _rust_bindings.has_tensor_engine(); print('Tensor engine available')"

        # Run CPU Python tests split into 10 groups sequentially.
        # GPU-gated cases skip via needs_cuda/needs_tensor_engine markers.
        pip install pytest-split
        run_test_groups
