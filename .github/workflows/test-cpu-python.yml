name: Test CPU Python

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Wheel artifact name from build workflow'
        required: true
        type: string
      python-version:
        description: 'Python version to test with'
        type: string
        default: '3.10'
      runner:
        description: 'Runner to use for the test'
        type: string
        default: 'linux.4xlarge'

concurrency:
  group: test-cpu-python-${{ inputs.runner }}-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  test-cpu-python-linux:
    if: ${{ startsWith(inputs.runner, 'linux') }}
    name: Test CPU Python - No Tensor Engine
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      timeout: 60
      runner: ${{ inputs.runner }}
      submodules: recursive
      download-artifact: ${{ inputs.artifact-name }}
      script: |
        # Source common setup functions
        source scripts/common-setup.sh

        # Fetch tests disabled via GitHub issues titled "DISABLED <test-name>".
        # Writes disabled_tests.txt (read by conftest.py).
        python3 scripts/fetch_disabled_tests.py

        # Setup test environment
        setup_conda_environment

        # Disable tensor engine
        export USE_TENSOR_ENGINE=0

        # Install PyTorch nightly
        pip install --pre torch --extra-index-url https://download.pytorch.org/whl/nightly/cpu

        # Install the built wheel from artifact
        install_wheel_from_artifact

        # Currently a no-op.
        # Tests requiring tensor engine / GPU need to be identified and flagged to skip.
        # We will just ensure monarch can be imported successfully.
        python -c "import monarch; print('Monarch imported successfully')"

        # Run CPU Python tests (excluding GPU/tensor engine tests)
        # TODO: Add appropriate test filters for CPU-only Python tests
        echo "CPU Python tests would run here - currently placeholder"

  test-cpu-python-macos:
    if: ${{ startsWith(inputs.runner, 'macos') }}
    name: Test CPU Python - No Tensor Engine (macOS)
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install macOS test dependencies
        shell: bash
        run: |
          set -eux
          source scripts/common-setup-macos.sh
          install_macos_base_dependencies
          install_macos_python_test_dependencies

      - name: Fetch disabled tests
        shell: bash
        run: |
          set -eux
          python3 scripts/fetch_disabled_tests.py

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ runner.temp }}/wheel-artifact

      - name: Install wheel
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target
          USE_TENSOR_ENGINE: "0"
        run: |
          set -eux
          python -m pip install "${{ runner.temp }}/wheel-artifact"/*.whl

      - name: Verify import
        shell: bash
        run: |
          set -eux
          python -c "import monarch; import monarch.actor; print('Monarch imported successfully')"

      - name: Run macOS CPU Python tests
        shell: bash
        env:
          USE_TENSOR_ENGINE: "0"
        run: |
          set -eux
          pytest -v -m "not oss_skip" --ignore-glob="**/meta/**" \
            python/tests/test_python_actors.py \
            python/tests/test_actor_error.py \
            python/tests/test_client_shutdown.py \
            python/tests/test_rdma_unsupported.py
