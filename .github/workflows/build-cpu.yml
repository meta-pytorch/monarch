name: Build CPU

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Wheel artifact name to upload'
        type: string
        default: 'monarch-cpu-py3.10'
      python-version:
        description: 'Python version to build with'
        type: string
        default: '3.10'
      runner:
        description: 'Linux runner to use for the build'
        type: string
        default: 'linux.4xlarge'

concurrency:
  group: build-cpu-${{ inputs.runner }}-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  build-cpu:
    name: Build CPU - No Tensor Engine
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      timeout: 60
      runner: ${{ inputs.runner }}
      submodules: recursive
      upload-artifact: ${{ inputs.artifact-name }}
      script: |
        # Source common setup functions
        source scripts/common-setup.sh

        # Setup build environment (conda + system deps + rust + uv)
        setup_build_environment ${{ inputs.python-version }}

        # Install nightly CPU torch + build-time deps only. The uv build
        # command below is the project build, so avoid an earlier isolated
        # editable build before USE_TENSOR_ENGINE is set.
        # --inexact keeps non-Python conda packages (fmt, nodejs) and tools
        # like pip/setuptools that conda installs automatically.
        uv sync --inexact --no-install-project --extra cpu-nightly --extra build

        # Build monarch (No tensor engine, CPU version)
        USE_TENSOR_ENGINE=0 uv build --wheel --no-build-isolation

        echo "=== sccache stats ==="
        sccache --show-stats || true
        echo "=== end sccache stats ==="
