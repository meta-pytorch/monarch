name: Build and publish versioned monarch wheels

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 0.1.0rc1 or 0.1.0)"
        required: true
      is_prerelease:
        description: "Is this a pre-release? (If false, tags as latest)"
        type: boolean
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-x86_64:
    name: Build and upload stable CUDA x86_64 wheels
    uses: pytorch/test-infra/.github/workflows/build_wheels_linux.yml@main
    with:
      repository: meta-pytorch/monarch
      ref: ""
      test-infra-repository: pytorch/test-infra
      test-infra-ref: main
      build-matrix: |
        {
          "include": [
            {"python_version": "3.10", "gpu_arch_type": "cpu", "gpu_arch_version": "", "desired_cuda": "cu132", "container_image": "pytorch/manylinux2_28-builder:cuda13.2", "build_name": "monarch-py3_10-cu132-x86_64", "validation_runner": "linux.c7i.2xlarge", "upload_to_base_bucket": "no"},
            {"python_version": "3.11", "gpu_arch_type": "cpu", "gpu_arch_version": "", "desired_cuda": "cu132", "container_image": "pytorch/manylinux2_28-builder:cuda13.2", "build_name": "monarch-py3_11-cu132-x86_64", "validation_runner": "linux.c7i.2xlarge", "upload_to_base_bucket": "no"},
            {"python_version": "3.12", "gpu_arch_type": "cpu", "gpu_arch_version": "", "desired_cuda": "cu132", "container_image": "pytorch/manylinux2_28-builder:cuda13.2", "build_name": "monarch-py3_12-cu132-x86_64", "validation_runner": "linux.c7i.2xlarge", "upload_to_base_bucket": "no"},
            {"python_version": "3.13", "gpu_arch_type": "cpu", "gpu_arch_version": "", "desired_cuda": "cu132", "container_image": "pytorch/manylinux2_28-builder:cuda13.2", "build_name": "monarch-py3_13-cu132-x86_64", "validation_runner": "linux.c7i.2xlarge", "upload_to_base_bucket": "no"}
          ]
        }
      pre-script: packaging/pre_build_script.sh
      post-script: packaging/post_build_script.sh
      env-var-script: packaging/release_binary_build_env.sh
      package-name: monarch
      build-platform: python-build-package
      build-command: bash packaging/build_wheel.sh "${{ github.event.inputs.version }}"
      trigger-event: schedule
      wheel-upload-path: whl/cu132/
      wheel-nightly-policy: gha_workflow_promote_wheels
      run-smoke-test: false
      timeout: 120
    secrets:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

  build-aarch64:
    name: Build and upload stable CUDA aarch64 wheels
    uses: pytorch/test-infra/.github/workflows/build_wheels_linux.yml@main
    with:
      repository: meta-pytorch/monarch
      ref: ""
      test-infra-repository: pytorch/test-infra
      test-infra-ref: main
      architecture: aarch64
      build-matrix: |
        {
          "include": [
            {"python_version": "3.10", "gpu_arch_type": "cpu", "gpu_arch_version": "", "desired_cuda": "cu132", "container_image": "pytorch/manylinuxaarch64-builder:cuda13.2", "build_name": "monarch-py3_10-cu132-aarch64", "validation_runner": "linux.arm64.2xlarge", "upload_to_base_bucket": "no"},
            {"python_version": "3.11", "gpu_arch_type": "cpu", "gpu_arch_version": "", "desired_cuda": "cu132", "container_image": "pytorch/manylinuxaarch64-builder:cuda13.2", "build_name": "monarch-py3_11-cu132-aarch64", "validation_runner": "linux.arm64.2xlarge", "upload_to_base_bucket": "no"},
            {"python_version": "3.12", "gpu_arch_type": "cpu", "gpu_arch_version": "", "desired_cuda": "cu132", "container_image": "pytorch/manylinuxaarch64-builder:cuda13.2", "build_name": "monarch-py3_12-cu132-aarch64", "validation_runner": "linux.arm64.2xlarge", "upload_to_base_bucket": "no"},
            {"python_version": "3.13", "gpu_arch_type": "cpu", "gpu_arch_version": "", "desired_cuda": "cu132", "container_image": "pytorch/manylinuxaarch64-builder:cuda13.2", "build_name": "monarch-py3_13-cu132-aarch64", "validation_runner": "linux.arm64.2xlarge", "upload_to_base_bucket": "no"}
          ]
        }
      pre-script: packaging/pre_build_script.sh
      post-script: packaging/post_build_script.sh
      env-var-script: packaging/release_binary_build_env.sh
      package-name: monarch
      build-platform: python-build-package
      build-command: bash packaging/build_wheel.sh "${{ github.event.inputs.version }}"
      trigger-event: schedule
      wheel-upload-path: whl/cu132/
      wheel-nightly-policy: gha_workflow_promote_wheels
      run-smoke-test: false
      timeout: 120
    secrets:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

  build-rocm-x86_64:
    name: Build and upload stable ROCm x86_64 wheels
    uses: pytorch/test-infra/.github/workflows/build_wheels_linux.yml@main
    with:
      repository: meta-pytorch/monarch
      ref: ""
      test-infra-repository: pytorch/test-infra
      test-infra-ref: main
      build-matrix: |
        {
          "include": [
            {"python_version": "3.10", "gpu_arch_type": "rocm", "gpu_arch_version": "7.2", "desired_cuda": "rocm7.2", "container_image": "pytorch/manylinux2_28-builder:rocm7.2", "build_name": "monarch-py3_10-rocm7_2-x86_64", "validation_runner": "linux.rocm.gpu.gfx942.1.meta-pytorch", "upload_to_base_bucket": "no"},
            {"python_version": "3.11", "gpu_arch_type": "rocm", "gpu_arch_version": "7.2", "desired_cuda": "rocm7.2", "container_image": "pytorch/manylinux2_28-builder:rocm7.2", "build_name": "monarch-py3_11-rocm7_2-x86_64", "validation_runner": "linux.rocm.gpu.gfx942.1.meta-pytorch", "upload_to_base_bucket": "no"},
            {"python_version": "3.12", "gpu_arch_type": "rocm", "gpu_arch_version": "7.2", "desired_cuda": "rocm7.2", "container_image": "pytorch/manylinux2_28-builder:rocm7.2", "build_name": "monarch-py3_12-rocm7_2-x86_64", "validation_runner": "linux.rocm.gpu.gfx942.1.meta-pytorch", "upload_to_base_bucket": "no"},
            {"python_version": "3.13", "gpu_arch_type": "rocm", "gpu_arch_version": "7.2", "desired_cuda": "rocm7.2", "container_image": "pytorch/manylinux2_28-builder:rocm7.2", "build_name": "monarch-py3_13-rocm7_2-x86_64", "validation_runner": "linux.rocm.gpu.gfx942.1.meta-pytorch", "upload_to_base_bucket": "no"}
          ]
        }
      pre-script: packaging/pre_build_script.sh
      post-script: packaging/post_build_script.sh
      env-var-script: packaging/release_binary_build_env.sh
      package-name: monarch
      build-platform: python-build-package
      build-command: bash packaging/build_wheel.sh "${{ github.event.inputs.version }}"
      trigger-event: schedule
      wheel-upload-path: whl/rocm7.2/
      wheel-nightly-policy: gha_workflow_promote_wheels
      run-smoke-test: false
      timeout: 120
    secrets:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

  build-macos:
    uses: ./.github/workflows/build-macos.yml
    with:
      python-versions: '["3.10", "3.11", "3.12", "3.13"]'
      runner: macos-latest
      torch-spec: 'torch==2.13.0 --extra-index-url https://download.pytorch.org/whl/cpu'
      version: ${{ github.event.inputs.version }}

  upload-macos:
    name: Upload stable macOS CPU wheels
    needs: build-macos
    uses: pytorch/test-infra/.github/workflows/_binary_upload.yml@main
    with:
      repository: meta-pytorch/monarch
      ref: ""
      test-infra-repository: pytorch/test-infra
      test-infra-ref: main
      trigger-event: schedule
      wheel-upload-path: whl/cpu/
      wheel-nightly-policy: gha_workflow_promote_wheels
      build-matrix: |
        {
          "include": [
            {"python_version": "3.10", "desired_cuda": "cpu", "upload_to_base_bucket": "no", "build_name": "monarch-py3_10-cpu-macos"},
            {"python_version": "3.11", "desired_cuda": "cpu", "upload_to_base_bucket": "no", "build_name": "monarch-py3_11-cpu-macos"},
            {"python_version": "3.12", "desired_cuda": "cpu", "upload_to_base_bucket": "no", "build_name": "monarch-py3_12-cpu-macos"},
            {"python_version": "3.13", "desired_cuda": "cpu", "upload_to_base_bucket": "no", "build_name": "monarch-py3_13-cpu-macos"}
          ]
        }
    secrets:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

  publish:
    name: Publish to download.pytorch.org
    needs: [build-x86_64, build-aarch64, build-rocm-x86_64, upload-macos]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Uploaded Monarch wheels to download.pytorch.org"

  build-and-push-stable:
    name: Build and push stable docker image
    # Only make a new docker image if the publish is successful
    needs: publish
    runs-on: ubuntu-latest
    environment: stable
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write # Grant write permission for packages (GHCR)

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine Docker Tags
        id: determine-tags
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PRERELEASE="${{ github.event.inputs.is_prerelease }}"
          TAGS="ghcr.io/${{ github.repository }}:${VERSION}-cuda13.2"
          if [[ "$PRERELEASE" == "false" ]]; then
            TAGS="$TAGS,ghcr.io/${{ github.repository }}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: . # Build context is the root directory
          file: ./Dockerfile
          push: true # Push the image to the registry
          tags: ${{ steps.determine-tags.outputs.tags }}
          build-args: |
            PYTORCH_TAG=2.13.0-cuda13.2-cudnn9-runtime
            MONARCH_VERSION=${{ github.event.inputs.version }}

  create-docs-branch:
    name: Create docs release branch
    needs: publish
    if: ${{ github.event.inputs.is_prerelease != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create docs/v${{ github.event.inputs.version }} branch
        run: |
          git checkout -b "docs/v${{ github.event.inputs.version }}"
          git push origin "docs/v${{ github.event.inputs.version }}"
