name: CI

on:
  pull_request:
    branches:
      - main
      - gh/**
  push:
    branches:
      - main
    tags:
      - ciflow/rocm/*
  workflow_dispatch: # Allows manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  build-gpu:
    name: Build GPU
    uses: ./.github/workflows/build-gpu.yml

  # CPU jobs skip on ROCm tags since they already run in the PR workflow
  build-cpu:
    name: Build CPU
    if: ${{ !startsWith(github.ref, 'refs/tags/ciflow/rocm/') }}
    uses: ./.github/workflows/build-cpu.yml
    with:
      artifact-name: monarch-cpu-${{ github.sha }}-py3.10

  test-cpu-python:
    name: Test CPU Python
    if: ${{ !startsWith(github.ref, 'refs/tags/ciflow/rocm/') }}
    needs: build-cpu
    uses: ./.github/workflows/test-cpu-python.yml
    with:
      artifact-name: monarch-cpu-${{ github.sha }}-py3.10

  test-gpu-python:
    name: Test GPU Python
    needs: build-gpu
    uses: ./.github/workflows/test-gpu-python.yml

  test-cpu-rust:
    name: Test CPU Rust
    if: ${{ !startsWith(github.ref, 'refs/tags/ciflow/rocm/') }}
    uses: ./.github/workflows/test-cpu-rust.yml

  test-cpu-rust-arm64:
    name: Test CPU Rust (ARM64)
    if: ${{ !startsWith(github.ref, 'refs/tags/ciflow/rocm/') }}
    uses: ./.github/workflows/test-cpu-rust.yml
    with:
      runner: linux.arm64.2xlarge
      docker-image: 'pytorch/manylinuxaarch64-builder:cuda12.8'

  test-gpu-rust:
    name: Test GPU Rust
    needs: build-gpu
    uses: ./.github/workflows/test-gpu-rust.yml

  build-docker:
    name: Build Docker image
    needs: build-gpu
    if: ${{ !startsWith(github.ref, 'refs/tags/ciflow/rocm/') }}
    uses: ./.github/workflows/build-docker.yml
    with:
      artifact-name: monarch-cuda-${{ github.sha }}-py3.12

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [test-cpu-python, test-gpu-python, test-cpu-rust, test-cpu-rust-arm64, test-gpu-rust]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          # GPU jobs must always pass
          if [[ "${{ needs.test-gpu-python.result }}" != "success" ]] ||
             [[ "${{ needs.test-gpu-rust.result }}" != "success" ]]; then
            echo "GPU tests failed"
            exit 1
          fi

          # CPU jobs must pass or be skipped (skipped on ROCm tag runs)
          if [[ "${{ needs.test-cpu-python.result }}" != "success" && "${{ needs.test-cpu-python.result }}" != "skipped" ]] ||
             [[ "${{ needs.test-cpu-rust.result }}" != "success" && "${{ needs.test-cpu-rust.result }}" != "skipped" ]] ||
             [[ "${{ needs.test-cpu-rust-arm64.result }}" != "success" && "${{ needs.test-cpu-rust-arm64.result }}" != "skipped" ]]; then
            echo "CPU tests failed"
            exit 1
          fi

          echo "All required jobs passed"
