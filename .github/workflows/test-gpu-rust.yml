name: Test GPU Rust

on:
  workflow_call:
    inputs:
      torch-spec:
        description: 'PyTorch install spec (e.g. --pre torch --extra-index-url ...)'
        required: true
        type: string
      gpu-arch-type:
        description: 'GPU architecture type (e.g. cuda)'
        required: true
        type: string
      gpu-arch-version:
        description: 'GPU architecture version (e.g. 12.8, 13.1)'
        required: true
        type: string
      python-version:
        description: 'Python version (e.g. 3.10, 3.12)'
        required: true
        type: string
      docker-image:
        description: 'Docker image to use for the test'
        required: true
        type: string

concurrency:
  group: test-gpu-rust-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  test-gpu-rust:
    name: Test GPU Rust (cuda${{ inputs.gpu-arch-version }}-py${{ inputs.python-version }})
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      timeout: 120
      runner: linux.g5.4xlarge.nvidia.gpu
      gpu-arch-type: ${{ inputs.gpu-arch-type }}
      gpu-arch-version: ${{ inputs.gpu-arch-version }}
      docker-image: ${{ inputs.docker-image }}
      submodules: recursive
      script: |
        # Source common setup functions
        source scripts/common-setup.sh

        # Fetch tests disabled via GitHub issues titled "DISABLED <test-name>".
        # Writes disabled_tests.txt and patches .config/nextest.toml with a filter.
        python3 scripts/fetch_disabled_tests.py

        # Setup test environment
        setup_test_environment

        # Install Rust
        setup_rust_toolchain

        # Install System dependencies
        install_system_dependencies

        # Setup Tensor Engine dependencies
        setup_tensor_engine

        # Setup CUDA environment and library paths
        setup_cuda_environment

        # Setup PyTorch with C++ headers using common-setup utility
        setup_pytorch_with_headers "${{ inputs.gpu-arch-version }}" "${{ inputs.torch-spec }}"

        # Run GPU Rust tests
        echo "Running OSS Rust tests..."
        # Uses cargo nextest to run tests in separate processes, which better matches
        # internal buck test behavior.
        # The CI profile is configured in .config/nextest.toml
        # Exclude filter is for packages that don't build in Github Actions yet.
        # * monarch_messages: monarch/target/debug/deps/monarch_messages-...:
        #   /lib64/libm.so.6: version `GLIBC_2.29' not found
        #   (required by /meta-pytorch/monarch/libtorch/lib/libtorch_cpu.so)
        timeout 12m cargo nextest run --workspace --profile ci \
          -E "$(cat .config/nextest-filter.txt)" \
          --exclude monarch_messages \
          --exclude monarch_tensor_worker \
          --exclude torch-sys-cuda \
          --exclude monarch_rdma \
          --exclude torch-sys

        echo "=== sccache stats ==="
        sccache --show-stats
        echo "=== end sccache stats ==="

        # Copy the test results to the expected location
        # TODO: error in pytest-results-action, TypeError: results.testsuites.testsuite.testcase is not iterable
        # Don't try to parse these results for now.
        # mkdir -p "${RUNNER_TEST_RESULTS_DIR:-test-results}"
        # cp target/nextest/ci/junit.xml "${RUNNER_TEST_RESULTS_DIR:-test-results}/junit.xml"
