name: Set Matrix

on:
  workflow_call:
    inputs:
      runner-rocm:
        description: 'Override default ROCm runner label'
        required: false
        type: string
        default: linux.rocm.gpu.gfx942.1
      runner-cuda:
        description: 'Override default CUDA runner label'
        required: false
        type: string
        default: linux.g5.4xlarge.nvidia.gpu
    outputs:
      matrix:
        description: dynamically set matrix
        value: ${{ jobs.set.outputs.matrix }}

jobs:
  set:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    env:
      # Event flags evaluated by github actions before the step runs:
      IS_PUSH: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads') }}
      IS_SCHEDULE:  ${{ github.event_name == 'schedule' }}
      IS_ROCM_TAG:  ${{ startsWith(github.ref, 'refs/tags/ciflow/rocm/') }}

    steps:
      - id: set
        run: |
          set -euo pipefail

          # Define ROCm matrices
          ROCM_71_MATRIX='{"name": "rocm7.1", "runner": "${{ inputs.runner-rocm }}", "gpu-arch-type": "rocm", "gpu-arch-version": "7.1", "docker-image": "pytorch/almalinux-builder:rocm7.1", "torch-spec": "torch --extra-index-url https://download.pytorch.org/whl/nightly/rocm7.1/"}'
          ROCM_72_MATRIX='{"name": "rocm7.2", "runner": "${{ inputs.runner-rocm }}", "gpu-arch-type": "rocm", "gpu-arch-version": "7.2", "docker-image": "pytorch/almalinux-builder:rocm7.2", "torch-spec": "torch --extra-index-url https://download.pytorch.org/whl/nightly/rocm7.2/"}'

          # Define CUDA matrix
          CUDA_MATRIX='{"name": "cuda", "runner": "${{ inputs.runner-cuda }}", "gpu-arch-type": "cuda", "gpu-arch-version": "12.8", "docker-image": "pytorch/manylinux2_28-builder:cuda12.8", "torch-spec": "--pre torch --extra-index-url https://download.pytorch.org/whl/nightly/cu128"}'

          # Decide which matrix entries to include based on event type
          if [[ "$IS_ROCM_TAG" == "true" ]]; then
            # ROCm tag: run both ROCm versions only
            echo "{\"include\": [$ROCM_71_MATRIX, $ROCM_72_MATRIX]}" > matrix.json
          elif [[ "$IS_PUSH" == "true" || "$IS_SCHEDULE" == "true" ]]; then
            # Push to branch or schedule: run CUDA and both ROCm versions
            echo "{\"include\": [$CUDA_MATRIX, $ROCM_71_MATRIX, $ROCM_72_MATRIX]}" > matrix.json
          else
            # Default (PRs without ROCm label): run CUDA only
            echo "{\"include\": [$CUDA_MATRIX]}" > matrix.json
          fi

          # Export matrix to job outputs
          {
            echo 'matrix<<EOF'
            cat matrix.json
            echo 'EOF'
          } >> $GITHUB_OUTPUT
