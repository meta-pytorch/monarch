name: Set Matrix

on:
  workflow_call:
    inputs:
      runner-rocm:
        description: 'Override default ROCm runner label'
        required: false
        type: string
        default: linux.rocm.gpu.gfx942.1
      runner-cuda:
        description: 'Override default CUDA runner label'
        required: false
        type: string
        default: linux.g5.4xlarge.nvidia.gpu
    outputs:
      matrix:
        description: dynamically set matrix
        value: ${{ jobs.set.outputs.matrix }}

jobs:
  set:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    env:
      # Event flags evaluated by github actions before the step runs:
      IS_MAIN_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      IS_SCHEDULE:  ${{ github.event_name == 'schedule' }}
      IS_ROCM_TAG:  ${{ startsWith(github.ref, 'refs/tags/ciflow/rocm/') }}
      TRIGGERED_ROCM_LABEL: ${{ github.event_name == 'pull_request' && github.event.action == 'labeled' }}

    steps:
      - id: set
        run: |
          set -euo pipefail

          # Define ROCm matrix
          ROCM_MATRIX=$(cat <<EOF
          {
            "name": "rocm",
            "runner": "${{ inputs.runner-rocm }}",
            "gpu-arch-type": "rocm",
            "gpu-arch-version": "7.2",
            "docker-image": "pytorch/almalinux-builder:rocm7.2",
            "torch-spec": "torch --extra-index-url https://download.pytorch.org/whl/nightly/rocm7.2/"
          }
          EOF
          )

          # Define CUDA matrix
          CUDA_MATRIX=$(cat <<EOF
          {
            "name": "cuda",
            "runner": "${{ inputs.runner-cuda }}",
            "gpu-arch-type": "cuda",
            "gpu-arch-version": "12.8",
            "docker-image": "pytorch/manylinux2_28-builder:cuda12.8",
            "torch-spec": "--pre torch --extra-index-url https://download.pytorch.org/whl/nightly/cu128"
          }
          EOF
          )

          # Use default value as 'false' for unset environment variables
          IS_MAIN_PUSH="${IS_MAIN_PUSH:-false}"
          IS_SCHEDULE="${IS_SCHEDULE:-false}"
          IS_ROCM_TAG="${IS_ROCM_TAG:-false}"
          TRIGGERED_ROCM_LABEL="${TRIGGERED_ROCM_LABEL:-false}"

          # Decide which matrix entries to include based on event type
          # Runs ROCm only for push tag OR when PR label gets triggered
          if [[ "$IS_ROCM_TAG" == "true" || "$TRIGGERED_ROCM_LABEL" == "true" ]]; then
            cat > matrix.json <<JSON
          {"include": [$ROCM_MATRIX]}
          JSON

          # Runs CUDA and ROCm for push to main or cron schedule
          elif [[ "$IS_MAIN_PUSH" == "true" || "$IS_SCHEDULE" == "true" ]]; then
            cat > matrix.json <<JSON
          {"include": [$CUDA_MATRIX,$ROCM_MATRIX]}
          JSON

          # Runs CUDA only as default (includes normal PR without ROCm label)
          else
            cat > matrix.json <<JSON
          {"include": [$CUDA_MATRIX]}
          JSON
          fi

          # Export matrix to job outputs
          {
            echo 'matrix<<EOF'
            cat matrix.json
            echo 'EOF'
          } >> $GITHUB_OUTPUT
