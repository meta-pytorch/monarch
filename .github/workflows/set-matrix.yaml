name: Set Matrix

on:
  workflow_call:
    inputs:
      runner-rocm:
        description: 'Override default ROCm runner label'
        required: false
        type: string
        default: linux.rocm.gpu.gfx942.1
      runner-cuda:
        description: 'Override default CUDA runner label'
        required: false
        type: string
        default: linux.g5.4xlarge.nvidia.gpu
    outputs:
      matrix:
        description: Test matrix (py3.10 only)
        value: ${{ jobs.set.outputs.matrix }}
      build-matrix:
        description: Build matrix (includes all python versions)
        value: ${{ jobs.set.outputs.build-matrix }}

jobs:
  set:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      build-matrix: ${{ steps.set.outputs.build-matrix }}
    env:
      # Event flags evaluated by github actions before the step runs:
      IS_PUSH: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads') }}
      IS_SCHEDULE:  ${{ github.event_name == 'schedule' }}
      IS_ROCM_TAG:  ${{ startsWith(github.ref, 'refs/tags/ciflow/rocm/') }}

    steps:
      - id: set
        run: |
          set -euo pipefail

          # Define test matrices (py3.10 only)
          CUDA='{"name": "cuda", "runner": "${{ inputs.runner-cuda }}", "gpu-arch-type": "cuda", "gpu-arch-version": "12.8", "docker-image": "pytorch/manylinux2_28-builder:cuda12.8", "torch-spec": "--pre torch --extra-index-url https://download.pytorch.org/whl/nightly/cu128"}'
          ROCM_71='{"name": "rocm7.1", "runner": "${{ inputs.runner-rocm }}", "gpu-arch-type": "rocm", "gpu-arch-version": "7.1", "docker-image": "pytorch/almalinux-builder:rocm7.1", "torch-spec": "torch --extra-index-url https://download.pytorch.org/whl/nightly/rocm7.1/"}'
          ROCM_72='{"name": "rocm7.2", "runner": "${{ inputs.runner-rocm }}", "gpu-arch-type": "rocm", "gpu-arch-version": "7.2", "docker-image": "pytorch/almalinux-builder:rocm7.2", "torch-spec": "torch --extra-index-url https://download.pytorch.org/whl/nightly/rocm7.2/"}'

          # Define build matrices (includes python-version)
          CUDA_PY310='{"name": "cuda", "python-version": "3.10", "docker-image": "pytorch/manylinux2_28-builder:cuda12.8", "torch-spec": "--pre torch --extra-index-url https://download.pytorch.org/whl/nightly/cu128"}'
          CUDA_PY312='{"name": "cuda", "python-version": "3.12", "docker-image": "pytorch/manylinux2_28-builder:cuda12.8", "torch-spec": "--pre torch --extra-index-url https://download.pytorch.org/whl/nightly/cu128"}'
          ROCM_71_PY310='{"name": "rocm7.1", "python-version": "3.10", "docker-image": "pytorch/almalinux-builder:rocm7.1", "torch-spec": "torch --extra-index-url https://download.pytorch.org/whl/nightly/rocm7.1/"}'
          ROCM_72_PY310='{"name": "rocm7.2", "python-version": "3.10", "docker-image": "pytorch/almalinux-builder:rocm7.2", "torch-spec": "torch --extra-index-url https://download.pytorch.org/whl/nightly/rocm7.2/"}'

          # Select matrices based on event type
          if [[ "$IS_ROCM_TAG" == "true" ]]; then
            # ROCm tag: ROCm only
            TEST_MATRIX="[$ROCM_71, $ROCM_72]"
            BUILD_MATRIX="[$ROCM_71_PY310, $ROCM_72_PY310]"
          elif [[ "$IS_PUSH" == "true" || "$IS_SCHEDULE" == "true" ]]; then
            # Push to branch or schedule: CUDA and ROCm
            TEST_MATRIX="[$CUDA, $ROCM_71, $ROCM_72]"
            BUILD_MATRIX="[$CUDA_PY310, $CUDA_PY312, $ROCM_71_PY310, $ROCM_72_PY310]"
          else
            # Default (PRs): CUDA only
            TEST_MATRIX="[$CUDA]"
            BUILD_MATRIX="[$CUDA_PY310, $CUDA_PY312]"
          fi

          # Export matrices to job outputs
          {
            echo 'matrix<<EOF'
            echo "{\"include\": $TEST_MATRIX}"
            echo 'EOF'
            echo 'build-matrix<<EOF'
            echo "{\"include\": $BUILD_MATRIX}"
            echo 'EOF'
          } >> $GITHUB_OUTPUT
